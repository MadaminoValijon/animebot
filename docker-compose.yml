services:
  postgres:
    image: postgres:16-alpine
    container_name: anime_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: anime_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime_bot -d anime_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
